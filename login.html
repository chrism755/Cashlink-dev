<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NETLINK AGENCIES</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
 .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
</style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
  <h1 class="text-3xl font-bold text-center text-purple-700 mb-2">NETLINK AGENCIES</h1>
  <p class="text-center text-gray-600 mb-6">Log in to your account</p>
  
  <div id="alert"></div>
  
  <form id="loginForm" class="space-y-4">
    <input type="text" id="username" placeholder="Enter username" required 
      class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
    
    <input type="password" id="password" placeholder="Enter password" required 
      class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">

    <button type="submit" 
      class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-bold text-lg transition">
      Log In
    </button>
  </form>
  
  <div class="flex justify-between mt-4 text-sm">
    <a href="#" onclick="forgotPassword()" class="text-purple-600 font-semibold">Forgot password?</a>
    <a href="/register" class="text-purple-600 font-semibold">Create account</a>
  </div>
</div>

<script>
// Check if user exists in browser storage
function getUsers() {
  return JSON.parse(localStorage.getItem('netlink_users') || '[]');
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const alertBox = document.getElementById('alert');
  
  const users = getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  
  if (!user) {
    alertBox.innerHTML = '<div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4">Invalid username or password</div>';
    return;
  }
  
  // Save logged in user
  localStorage.setItem('netlink_user', JSON.stringify(user));
  alertBox.innerHTML = '<div class="bg-green-100 text-green-700 px-4 py-3 rounded-lg mb-4">Login successful! Redirecting...</div>';
  
  setTimeout(() => {
    if (user.active) {
      window.location.href = '/dashboard';
    } else {
      window.location.href = '/activation';
    }
  }, 1500);
});

function forgotPassword() {
  document.getElementById('alert').innerHTML = '<div class="bg-blue-100 text-blue-700 px-4 py-3 rounded-lg mb-4">Enter your email on the next page</div>';
  setTimeout(() => {
    window.location.href = '/forgot';
  }, 1000);
}
</script>

</body>
</html>
