<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASHLINK AGENCIES</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:'Segoe UI',sans-serif}
.hidden{display:none}
</style>
</head>
<body class="bg-gray-100">

<div id="app"></div>

<script>
let users = JSON.parse(localStorage.getItem('ca_users')||'[]');
let activations = JSON.parse(localStorage.getItem('ca_activations')||'[]');
let currentUser = JSON.parse(localStorage.getItem('ca_current')||'null');
let page = currentUser ? (currentUser.activated ? 'dashboard' : 'activate') : 'register';

function save(){
  localStorage.setItem('ca_users',JSON.stringify(users));
  localStorage.setItem('ca_activations',JSON.stringify(activations));
  localStorage.setItem('ca_current',JSON.stringify(currentUser));
}

function render(){
  if(page==='register') renderRegister();
  else if(page==='login') renderLogin();
  else if(page==='activate') renderActivate();
  else if(page==='dashboard') renderDashboard();
  else if(page==='admin') renderAdmin();
}

function renderRegister(){
  document.getElementById('app').innerHTML=`
  <div class="min-h-screen bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold text-center mb-2 text-purple-700">CASHLINK AGENCIES</h1>
      <h2 class="text-xl font-semibold mb-4 text-center">Create Account</h2>
      <div id="msg"></div>
      <form id="regForm" class="space-y-3">
        <input name="username" placeholder="Username" required class="w-full p-3 border rounded-lg">
        <input name="email" type="email" placeholder="Email" required class="w-full p-3 border rounded-lg">
        <input name="phone" placeholder="Phone Number" required class="w-full p-3 border rounded-lg">
        <input name="whatsapp" placeholder="Whatsapp Number" required class="w-full p-3 border rounded-lg">
        <select name="country" required class="w-full p-3 border rounded-lg">
          <option value="">Select Country</option>
          <option>Kenya</option><option>Uganda</option><option>Tanzania</option><option>Nigeria</option>
        </select>
        <input name="password" type="password" placeholder="Password" required class="w-full p-3 border rounded-lg">
        <input name="confirmPassword" type="password" placeholder="Confirm Password" required class="w-full p-3 border rounded-lg">
        <button class="w-full bg-purple-600 text-white p-3 rounded-lg font-semibold hover:bg-purple-700">Register</button>
      </form>
      <p class="text-center text-sm mt-4">Already have account? <span class="text-purple-600 cursor-pointer" onclick="page='login';render()">Login</span></p>
    </div>
  </div>`;
  
  document.getElementById('regForm').onsubmit=(e)=>{
    e.preventDefault();
    const f=new FormData(e.target);
    const data=Object.fromEntries(f);
    if(data.password!==data.confirmPassword){showMsg('Passwords do not match','red');return;}
    if(users.find(u=>u.username===data.username)){showMsg('Username taken','red');return;}
    if(users.find(u=>u.email===data.email)){showMsg('Email taken','red');return;}
    
    const user={...data,activated:false,balance:0,earnings:0,refCount:0,is_admin:false};
    users.push(user);
    currentUser=user;
    save();
    page='activate';
    render();
  }
}

function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div class="min-h-screen bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold text-center mb-2 text-purple-700">CASHLINK AGENCIES</h1>
      <h2 class="text-xl font-semibold mb-4 text-center">Login</h2>
      <div id="msg"></div>
      <form id="loginForm" class="space-y-3">
        <input name="username" placeholder="Username" required class="w-full p-3 border rounded-lg">
        <input name="password" type="password" placeholder="Password" required class="w-full p-3 border rounded-lg">
        <button class="w-full bg-purple-600 text-white p-3 rounded-lg font-semibold hover:bg-purple-700">Login</button>
      </form>
      <p class="text-center text-sm mt-2 text-purple-600 cursor-pointer" onclick="forgot()">Forgot password?</p>
      <p class="text-center text-sm mt-2">No account? <span class="text-purple-600 cursor-pointer" onclick="page='register';render()">Register</span></p>
      <p class="text-center text-xs mt-4 text-gray-500">Admin: username admin, password Cashlink2026</p>
    </div>
  </div>`;
  
  document.getElementById('loginForm').onsubmit=(e)=>{
    e.preventDefault();
    const f=new FormData(e.target);
    const username=f.get('username');
    const password=f.get('password');
    
    if(username==='admin' && password==='Cashlink2026'){
      currentUser={username:'admin',is_admin:true,activated:true};
      page='admin';
      save();render();return;
    }
    
    const user=users.find(u=>u.username===username && u.password===password);
    if(!user){showMsg('Invalid credentials','red');return;}
    currentUser=user;
    page=user.activated?'dashboard':'activate';
    save();render();
  }
}

function forgot(){
  const email=prompt('Enter your email');
  if(email)alert('Password reset link would be sent to '+email+' in a real system');
}

function renderActivate(){
  document.getElementById('app').innerHTML=`
  <div class="min-h-screen bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold mb-4 text-center">Activate Account - Ksh 150</h2>
      <div id="msg"></div>
      <div class="mb-4">
        <label class="font-semibold">Pay with:</label>
        <select id="method" class="w-full p-2 border rounded mt-1" onchange="toggleMethod()">
          <option value="mpesa">M-PESA</option>
          <option value="paypal">PayPal</option>
        </select>
      </div>
      <div id="mpesa" class="bg-yellow-50 p-4 rounded-lg mb-4">
        <p class="font-semibold">M-PESA Instructions:</p>
        <p>1. Go to M-PESA</p>
        <p>2. Lipa na M-PESA → Paybill</p>
        <p>3. Business No: 254706494401</p>
        <p>4. Account: ${currentUser.username}</p>
        <p>5. Amount: 150</p>
        <p>6. Name: MARY MPURUNGA</p>
      </div>
      <div id="paypal" class="bg-blue-50 p-4 rounded-lg mb-4 hidden">
        <p class="font-semibold">PayPal Instructions:</p>
        <p>Send 150 Ksh to: marympurunga@gmail.com</p>
      </div>
      <input id="txnId" placeholder="Enter Transaction ID" class="w-full p-3 border rounded-lg mb-3">
      <button onclick="submitTxn()" class="w-full bg-green-600 text-white p-3 rounded-lg font-semibold hover:bg-green-700">Submit Transaction ID</button>
      <button onclick="logout()" class="w-full mt-2 bg-gray-300 p-2 rounded">Logout</button>
    </div>
  </div>`;
}

function toggleMethod(){
  const m=document.getElementById('method').value;
  document.getElementById('mpesa').classList.toggle('hidden',m!=='mpesa');
  document.getElementById('paypal').classList.toggle('hidden',m!=='paypal');
}

function submitTxn(){
  const txnId=document.getElementById('txnId').value;
  if(!txnId){alert('Enter Transaction ID');return;}
  activations.push({user:currentUser.username,txnId,method:document.getElementById('method').value,status:'pending'});
  save();
  showMsg('Dear user we have received your request wait 1-2 minutes to get your account activated','green');
}

function getGreeting(){
  const h=new Date().getHours();
  if(h<12)return'Good morning';
  if(h<18)return'Good afternoon';
  return'Good evening';
}

function renderDashboard(){
  const greeting=getGreeting();
  const refLink=window.location.origin+window.location.pathname+'?ref='+currentUser.username;
  document.getElementById('app').innerHTML=`
  <div class="min-h-screen flex">
    <div class="w-64 bg-purple-800 text-white p-4 overflow-y-auto">
      <h2 class="text-xl font-bold mb-4">Menu</h2>
      <ul class="space-y-1 text-sm">
        ${['Home','E-tournaments','Karibu bonus','Pay for Clients','Deposit','Mentorship','Company advertisement','Betting prediction','Cashout','Article','View ads','Ticktock videos','Instagram videos','YouTube videos','Withdraw Tasks','Downlines','Whatsapp adverts','Forex trading','Trivia Quiz','Daily servey','Math quiz','Number game','Community','Get help','Time table','Profile'].map(item=>`<li class="hover:bg-purple-700 p-2 rounded cursor-pointer" onclick="alert('${item} page - build this next')">${item}</li>`).join('')}
        <li class="hover:bg-red-700 p-2 rounded cursor-pointer mt-4" onclick="logout()">Logout</li>
      </ul>
    </div>
    <div class="flex-1 p-6">
      <h1 class="text-2xl font-bold mb-4">${greeting} ${currentUser.username}</h1>
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-red-500 text-white p-4 rounded-lg"><p class="text-sm">Expenses - Activation Fee</p><p class="text-2xl font-bold">Ksh 150</p></div>
        <div class="bg-green-500 text-white p-4 rounded-lg"><p class="text-sm">Total Earnings</p><p class="text-2xl font-bold">Ksh ${currentUser.earnings}</p></div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div class="bg-white p-3 rounded-lg shadow"><p class="text-xs text-gray-500">Account Balance</p><p class="text-lg font-bold">Ksh ${currentUser.balance}</p></div>
        <div class="bg-white p-3 rounded-lg shadow"><p class="text-xs text-gray-500">Withdrawn Amount</p><p class="text-lg font-bold">Ksh 0</p></div>
        <div class="bg-white p-3 rounded-lg shadow"><p class="text-xs text-gray-500">Pending Amount</p><p class="text-lg font-bold">Ksh 0</p></div>
        <div class="bg-white p-3 rounded-lg shadow"><p class="text-xs text-gray-500">Weekly Bonus</p><p class="text-lg font-bold">Ksh 0</p></div>
        <div class="bg-white p-3 rounded-lg shadow"><p class="text-xs text-gray-500">Karibu Bonus</p><p class="text-lg font-bold">Ksh 0</p></div>
      </div>
      <div class="bg-white p-4 rounded-lg shadow">
        <p class="font-semibold mb-2">Your Referral Link</p>
        <div class="flex gap-2 flex-wrap">
          <input value="${refLink}" readonly class="flex-1 p-2 border rounded">
          <button onclick="navigator.clipboard.writeText('${refLink}')" class="bg-purple-600 text-white px-4 rounded">Copy</button>
          <button onclick="window.open('https://wa.me/?text=${refLink}')" class="bg-green-500 text-white px-4 rounded">WhatsApp</button>
          <button onclick="window.open('https://facebook.com/sharer/sharer.php?u=${refLink}')" class="bg-blue-600 text-white px-4 rounded">Facebook</button>
          <button onclick="window.open('https://t.me/share/url?url=${refLink}')" class="bg-blue-400 text-white px-4 rounded">Telegram</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderAdmin(){
  document.getElementById('app').innerHTML=`
  <div class="min-h-screen flex">
    <div class="w-64 bg-gray-800 text-white p-4">
      <h2 class="text-xl font-bold mb-4">Admin Menu</h2>
      <ul class="space-y-2 text-sm">
        ${['Home','Manage User','Activation','Withdraw','Pending Deposits','Add Admin','My Agent','Add Telegram Link','Add Whatsapp Link','Post','Setting'].map(item=>`<li class="hover:bg-gray-700 p-2 rounded cursor-pointer" onclick="alert('${item} - build this next')">${item}</li>`).join('')}
        <li class="hover:bg-red-700 p-2 rounded cursor-pointer mt-4" onclick="logout()">Logout</li>
      </ul>
    </div>
    <div class="flex-1 p-6">
      <h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <div class="bg-blue-500 text-white p-4 rounded-lg"><p>Total Users</p><p class="text-2xl font-bold">${users.length}</p></div>
        <div class="bg-green-500 text-white p-4 rounded-lg"><p>Active Users</p><p class="text-2xl font-bold">${users.filter(u=>u.activated).length}</p></div>
        <div class="bg-red-500 text-white p-4 rounded-lg"><p>Pending Withdraw</p><p class="text-2xl font-bold">0</p></div>
        <div class="bg-purple-500 text-white p-4 rounded-lg"><p>Pending Activation</p><p class="text-2xl font-bold">${activations.filter(a=>a.status==='pending').length}</p></div>
        <div class="bg-yellow-600 text-white p-4 rounded-lg"><p>Pending Deposits</p><p class="text-2xl font-bold">0</p></div>
      </div>
      <div class="mt-6 bg-white p-4 rounded-lg shadow">
        <h3 class="font-bold mb-2">Pending Activations</h3>
        ${activations.filter(a=>a.status==='pending').map(a=>`
          <div class="border p-2 rounded mb-2 flex justify-between">
            <div><b>${a.user}</b> - ${a.txnId} - ${a.method}</div>
            <div>
              <button onclick="approveActivation('${a.txnId}')" class="bg-green-500 text-white px-3 py-1 rounded mr-2">Approve</button>
              <button onclick="rejectActivation('${a.txnId}')" class="bg-red-500 text-white px-3 py-1 rounded">Reject</button>
            </div>
          </div>
        `).join('')||'<p>No pending activations</p>'}
      </div>
    </div>
  </div>`;
}

function approveActivation(txnId){
  const act=activations.find(a=>a.txnId===txnId);
  if(!act)return;
  act.status='approved';
  const user=users.find(u=>u.username===act.user);
  if(user)user.activated=true;
  save();renderAdmin();
}

function rejectActivation(txnId){
  activations=activations.filter(a=>a.txnId!==txnId);
  save();renderAdmin();
}

function logout(){
  currentUser=null;
  page='login';
  save();render();
}

function showMsg(text,color){
  document.getElementById('msg').innerHTML=`<div class="bg-${color}-100 text-${color}-700 p-2 rounded mb-3">${text}</div>`;
}

render();
</script>
</body>
  </html>
