<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - NETLINK AGENCIES</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
 .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
</style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
  <h1 class="text-3xl font-bold text-center text-purple-700 mb-2">NETLINK AGENCIES</h1>
  <p class="text-center text-gray-600 mb-6">Create your account</p>
  
  <div id="alert"></div>
  
  <div class="space-y-4">
    <input type="text" id="username" placeholder="Username" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
    <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
    <input type="tel" id="phone" placeholder="Phone Number" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
    <input type="tel" id="mpesa" placeholder="M-Pesa Number" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
    <select id="country" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
      <option value="">Select Country</option>
      <option value="Kenya">Kenya</option>
      <option value="Uganda">Uganda</option>
      <option value="Tanzania">Tanzania</option>
    </select>
    <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none">
    
    <button onclick="register()" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-bold text-lg transition">
      Register
    </button>
  </div>
  
  <p class="text-center mt-4 text-gray-600">
    Already have an account? <a href="/login.html" class="text-purple-600 font-semibold">Login</a>
  </p>
</div>

<script>
function register() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const mpesa = document.getElementById('mpesa').value.trim();
  const country = document.getElementById('country').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const alertBox = document.getElementById('alert');
  
  if (!username || !email || !phone || !mpesa || !country || !password) {
    alertBox.innerHTML = '<div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4">All fields are required</div>';
    return;
  }
  
  if (password !== confirmPassword) {
    alertBox.innerHTML = '<div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4">Passwords do not match</div>';
    return;
  }
  
  let users = JSON.parse(localStorage.getItem('netlink_users') || '[]');
  
  if (users.find(u => u.username === username || u.email === email)) {
    alertBox.innerHTML = '<div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4">Username or email already exists</div>';
    return;
  }
  
  const newUser = { username, email, phone, mpesa, country, password, active: false };
  
  users.push(newUser);
  localStorage.setItem('netlink_users', JSON.stringify(users));
  localStorage.setItem('netlink_user', JSON.stringify(newUser));
  
  alertBox.innerHTML = '<div class="bg-green-100 text-green-700 px-4 py-3 rounded-lg mb-4">Account created! Redirecting to activation...</div>';
  
  setTimeout(() => {
    window.location.replace('/activation.html');
  }, 1500);
}
</script>

</body>
     </html>
